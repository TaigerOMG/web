<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LacostaHaus | Agente inmobiliario</title>
  <meta name="description" content="Agente inmobiliario LacostaHaus">
  <link rel="icon" type="image/png" href="../assets/favicon-32x32.png">
  <link rel="stylesheet" href="../style.css?v=20260703-coverflow-icons1">
</head>
<body data-page="agent">
<header class="site-header">
  <a class="brand-link" href="../index.html" data-route="home"><img class="logo" src="../assets/logo-lacostahaus-small.png" alt="LacostaHaus"></a>
  <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false"><span></span><span></span><span></span></button>
  <nav class="site-nav">
    <ul>
      <li><a href="../index.html" data-route="home" data-i18n="nav.home">Inicio</a></li>
      <li class="dropdown">
        <a href="../inmuebles/" data-route="properties" data-i18n="nav.properties">Inmuebles</a>
        <ul class="dropdown-menu">
          <li><a href="../inmuebles/" data-route="properties" data-i18n="nav.allProperties">Todos los inmuebles</a></li>
        </ul>
      </li>
      <li><a href="../contacto/" data-route="contact" data-i18n="nav.contact">Contacto</a></li>
      <li class="dropdown language-dropdown">
        <a href="#" data-i18n="nav.languages">Idiomas</a>
        <ul class="dropdown-menu language-menu" data-language-menu></ul>
      </li>
    </ul>
  </nav>
</header>

<main class="agent-main-v2">
  <section class="agent-profile-v2 container-custom">
    <div class="agent-photo-card">
      <img src="../assets/contacto-asesor-medium.jpg" srcset="../assets/contacto-asesor-thumb.jpg 360w, ../assets/contacto-asesor-medium.jpg 1280w" sizes="(max-width: 860px) 80vw, 360px" alt="Sergiu Crudu" data-agent-photo loading="lazy" decoding="async">
    </div>
    <article class="agent-info-card">
      <span class="kicker" data-agent-kicker>Agente inmobiliario</span>
      <h1 data-agent-title>Sergiu Crudu</h1>
      <p class="agent-role" data-agent-role>Representante de ventas para mercados internacionales</p>
      <p data-agent-intro></p>

      <section class="agent-languages">
        <h2 data-agent-languages-title>Idiomas</h2>
        <div class="agent-language-list" data-agent-languages></div>
      </section>

      <section class="agent-contact-methods">
        <h2 data-agent-contact-title>Contacto directo</h2>
        <div class="agent-contact-list" data-agent-contact-list></div>
      </section>

      <a class="btn-secondary-home btn-hover-effect" href="../contacto/" data-route="contact" data-agent-back>Contacto Web</a>
    </article>
  </section>
  <footer class="footer-home-v2" data-site-footer></footer>
</main>

<script src="../script.js?v=20260706-main-image-lightbox"></script>
</body>
</html>
